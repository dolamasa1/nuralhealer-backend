<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>IPIP-120 Personality Test</title>
    <link rel="stylesheet" href="quiz.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>

<body>
    <div class="lang-toggle" id="langToggle"><span id="langText">العربية</span></div>
    <div class="theme-toggle" id="themeToggle">🌓</div>

    <div class="container">
        <div class="test">
            <h1>Personality Assessment (IPIP-120)</h1>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Loading...</div>
            </div>
            <div class="question-card">
                <div class="question-text" id="questionText">...</div>
                <div class="options" id="options"></div>
            </div>
            <div class="nav-buttons">
                <button class="btn-secondary" id="prevBtn">Previous</button>
                <button class="btn-primary" id="nextBtn">Next</button>
            </div>
        </div>

        <!-- Update the results div in both HTML files -->
        <!-- For ipip_50_test.html and ipip120_test.html, replace the results section with: -->
        <div class="results" id="results">
            <h1 id="resultsTitle">Your Personality Results</h1>
            <div id="resultsList"></div>
            <!-- Action buttons will be added by JavaScript -->
        </div>
    </div>

    <script src="quiz.js"></script>
    <script>
        const quiz = new QuizEngine({
            type: 'ipip120',
            baseUrl: 'http://localhost:8080/api/quizzes/ipip120'
        });
        window.onload = () => quiz.init();
    </script>
</body>

</html>
