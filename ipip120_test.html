<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPIP-NEO-120 Personality Test</title>
    <style>
        :root {
            --primary: #9B59B6;
            --secondary: #8E44AD;
            --accent: #BB8FCE;
            --bg-primary: #F8F9FA;
            --bg-secondary: #FFFFFF;
            --text-primary: #2C1A3F;
            --text-secondary: #5D4E6D;
            --border: #D5C7E8;
            --success: #27AE60;
            --warning: #F39C12;
            --error: #E74C3C;
        }

        :root.dark {
            --bg-primary: #1A1625;
            --bg-secondary: #1C1A2B;
            --text-primary: #ECE8F5;
            --text-secondary: #C5B8D9;
            --border: #3F3651;
        }

        [dir="rtl"] {
            direction: rtl;
            text-align: right;
        }

        [dir="rtl"] .trait-insight {
            border-left: none;
            border-right: 4px solid var(--primary);
        }

        [dir="rtl"] .trait-insight::before {
            left: auto;
            right: 0;
        }

        [dir="rtl"] .trait-insight:hover {
            transform: translateX(-4px);
        }

        [dir="rtl"] .trait-icon {
            margin-right: 0;
            margin-left: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        [dir="rtl"] .theme-toggle {
            right: auto;
            left: 20px;
        }

        .lang-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 25px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        [dir="rtl"] .lang-toggle {
            left: auto;
            right: 20px;
        }

        .lang-toggle:hover,
        .theme-toggle:hover {
            transform: scale(1.1);
            border-color: var(--primary);
        }

        .progress-bar {
            background: var(--border);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 100%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            color: var(--text-primary);
        }

        .question-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 35px;
            margin-bottom: 30px;
            border: 2px solid var(--border);
            box-shadow: 0 4px 6px rgba(155, 89, 182, 0.1);
        }

        .question-text {
            font-size: 20px;
            margin-bottom: 30px;
            line-height: 1.6;
            color: var(--text-primary);
            font-weight: 500;
        }

        .options {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .option {
            flex: 1;
            background: var(--bg-primary);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .option:hover {
            border-color: var(--primary);
            background: rgba(155, 89, 182, 0.1);
            transform: translateY(-2px);
        }

        .option.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .option-value {
            display: block;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .option.selected .option-value {
            color: white;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(155, 89, 182, 0.3);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            background: rgba(155, 89, 182, 0.05);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary:disabled:hover {
            transform: none;
            border-color: var(--border);
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .domain-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 16px;
            border: 2px solid var(--border);
            box-shadow: 0 4px 6px rgba(155, 89, 182, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .domain-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(155, 89, 182, 0.15);
        }

        .domain-card.expanded {
            border-color: var(--primary);
        }

        .domain-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .domain-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .domain-score {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .domain-bar {
            background: var(--border);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 12px;
            position: relative;
        }

        .domain-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .expand-indicator {
            font-size: 20px;
            color: var(--text-secondary);
            transition: transform 0.3s ease;
        }

        .domain-card.expanded .expand-indicator {
            transform: rotate(180deg);
        }

        .facets-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }

        .domain-card.expanded .facets-container {
            max-height: 2000px;
            opacity: 1;
            margin-top: 20px;
        }

        .facet-item {
            background: var(--bg-primary);
            border-radius: 10px;
            padding: 16px 18px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent);
        }

        [dir="rtl"] .facet-item {
            border-left: none;
            border-right: 3px solid var(--accent);
        }

        .facet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .facet-name {
            font-size: 15px;
            font-weight: 600;
        }

        .facet-score {
            font-size: 18px;
            font-weight: 700;
            color: var(--secondary);
        }

        .facet-bar {
            background: var(--border);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .facet-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
        }

        .facet-description {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .radar-chart-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid var(--border);
            box-shadow: 0 4px 6px rgba(155, 89, 182, 0.1);
        }

        .radar-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
        }

        #radarChart {
            width: 100%;
            max-width: 600px;
            height: 500px;
            margin: 0 auto;
            display: block;
        }

        .edit-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            font-style: italic;
        }

        @media (max-width: 600px) {
            .options {
                flex-direction: column;
            }

            .option {
                padding: 15px;
            }

            #radarChart {
                height: 400px;
            }
        }
    </style>
</head>

<body>
    <div class="lang-toggle" id="langToggle">
        <span id="langText">العربية</span>
    </div>

    <div class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
    </div>

    <div class="container">
        <div class="test">
            <h1>Personality Assessment</h1>

            <div class="progress-text">
                <span id="progressText">Question 1 of 120</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-card" id="questionCard">
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn-secondary" id="prevBtn" disabled>Previous</button>
                <button class="btn-primary" id="nextBtn">Next</button>
            </div>
        </div>

        <div class="results" id="results">
            <h1>Your Results</h1>

            <div class="radar-chart-container">
                <div class="radar-title">Your Personality Radar</div>
                <canvas id="radarChart"></canvas>
            </div>

            <div id="resultsList"></div>
            <div class="edit-hint">Click on any domain above to expand and see detailed facets</div>
            <div class="nav-buttons" style="margin-top: 30px;">
                <button class="btn-secondary" id="retakeBtn">Retake Test</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:8080/api/quizzes/ipip120';
        let currentQuestionId = 1;
        let totalQuestions = 120;
        let questions = [];
        let sessionAnswers = {};
        let currentLang = 'en';

        const elements = {
            langToggle: document.getElementById('langToggle'),
            langText: document.getElementById('langText'),
            themeToggle: document.getElementById('themeToggle'),
            progressText: document.getElementById('progressText'),
            progressFill: document.getElementById('progressFill'),
            questionText: document.getElementById('questionText'),
            options: document.getElementById('options'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            results: document.getElementById('results'),
            test: document.querySelector('.test'),
            resultsList: document.getElementById('resultsList'),
            retakeBtn: document.getElementById('retakeBtn')
        };

        const translations = {
            en: {
                title: "Personality Assessment",
                questionOf: "Question",
                of: "of",
                complete: "complete",
                previous: "Previous",
                next: "Next",
                viewResults: "View Results",
                retake: "Retake Test",
                yourResults: "Your Results",
                yourProfile: "Your Personality Profile",
                radarTitle: "Your Personality Radar",
                editHint: "Click on any domain above to expand and see detailed facets",
                loading: "Loading...",
                error: "An error occurred. Please try again.",
                startingQuiz: "Starting quiz...",
                savingResponse: "Saving...",
                loadingResults: "Loading your results...",
                options: ["Very Inaccurate", "Moderately Inaccurate", "Neither", "Moderately Accurate", "Very Accurate"]
            },
            ar: {
                title: "تقييم الشخصية",
                questionOf: "سؤال",
                of: "من",
                complete: "مكتمل",
                previous: "السابق",
                next: "التالي",
                viewResults: "عرض النتائج",
                retake: "إعادة الاختبار",
                yourResults: "نتائجك",
                yourProfile: "ملف شخصيتك",
                radarTitle: "رادار شخصيتك",
                editHint: "انقر على أي مجال أعلاه للتوسيع ورؤية الجوانب التفصيلية",
                loading: "جاري التحميل...",
                error: "حدث خطأ. يرجى المحاولة مرة أخرى.",
                startingQuiz: "بدء الاختبار...",
                savingResponse: "جاري الحفظ...",
                loadingResults: "جاري تحميل نتائجك...",
                options: ["غير دقيق جداً", "غير دقيق إلى حد ما", "محايد", "دقيق إلى حد ما", "دقيق جداً"]
            }
        };

        async function fetchWithAuth(url, options = {}) {
            let session = localStorage.getItem('quiz_session_120');

            const headers = {
                ...options.headers,
                'X-Quiz-Session-120': session
            };

            const response = await fetch(url, { ...options, headers });

            if (response.status === 401) {
                console.warn("Session unauthorized. Clearing and starting new session.");
                localStorage.removeItem('quiz_session_120');

                // Try to start a new session
                const startResponse = await fetch(`${API_BASE_URL}/start`, { method: 'POST' });
                const startData = await startResponse.json();
                const newSession = startData.sessionId;
                localStorage.setItem('quiz_session_120', newSession);

                // Retry requested fetch with new session
                headers['X-Quiz-Session-120'] = newSession;
                return fetch(url, { ...options, headers });
            }

            return response;
        }

        async function init() {
            try {
                let session = localStorage.getItem('quiz_session_120');
                if (!session) {
                    const response = await fetch(`${API_BASE_URL}/start`, { method: 'POST' });
                    const data = await response.json();
                    session = data.sessionId;
                    localStorage.setItem('quiz_session_120', session);
                }

                await loadQuestions();
                await loadExistingResponses();

                // Set current question to first unanswered
                currentQuestionId = 1;
                for (let i = 1; i <= totalQuestions; i++) {
                    if (!sessionAnswers[i]) {
                        currentQuestionId = i;
                        break;
                    }
                    if (i === totalQuestions) currentQuestionId = totalQuestions;
                }

                renderQuestion();
            } catch (err) {
                console.error(err);
                alert(translations[currentLang].error);
            }
        }

        async function loadQuestions() {
            const response = await fetchWithAuth(`${API_BASE_URL}/questions`);
            questions = await response.json();
            totalQuestions = questions.length || 120;
        }

        async function loadExistingResponses() {
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/responses`);
                const data = await response.json();
                if (data.responses) {
                    sessionAnswers = {}; // Clear local state first
                    data.responses.forEach(r => {
                        sessionAnswers[r.questionId] = r.score;
                    });
                }
            } catch (e) {
                console.error("Failed to load responses", e);
            }
        }

        async function renderQuestion() {
            if (!questions || !questions.length) return;
            const q = questions[currentQuestionId - 1];
            if (!q) return;

            elements.questionText.textContent = currentLang === 'ar' ? q.arabic_text : q.text;

            elements.options.innerHTML = '';
            translations[currentLang].options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option' + (sessionAnswers[currentQuestionId] === (idx + 1) ? ' selected' : '');
                div.innerHTML = `<span class="option-value">${idx + 1}</span>${opt}`;
                div.onclick = () => selectOption(idx + 1);
                elements.options.appendChild(div);
            });

            await updateProgress();
        }

        async function updateProgress() {
            const completedCount = Object.keys(sessionAnswers).length;
            const percent = (completedCount / totalQuestions) * 100;
            elements.progressFill.style.width = percent + '%';

            const percentageText = `(${Math.round(percent)}% ${translations[currentLang].complete})`;
            elements.progressText.textContent = `${translations[currentLang].questionOf} ${currentQuestionId} ${translations[currentLang].of} ${totalQuestions} ${percentageText}`;

            elements.prevBtn.disabled = currentQuestionId === 1;
            elements.nextBtn.textContent = currentQuestionId === totalQuestions ? translations[currentLang].viewResults : translations[currentLang].next;
        }

        async function selectOption(val) {
            sessionAnswers[currentQuestionId] = val;
            const optionDivs = elements.options.querySelectorAll('.option');
            optionDivs.forEach((div, idx) => {
                div.classList.toggle('selected', (idx + 1) === val);
            });

            await saveAnswer(currentQuestionId, val);

            setTimeout(() => {
                if (currentQuestionId < totalQuestions) {
                    currentQuestionId++;
                    renderQuestion();
                } else {
                    submitQuiz();
                }
            }, 300);
        }

        async function saveAnswer(id, val) {
            try {
                await fetchWithAuth(`${API_BASE_URL}/submit-question`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ questionId: id, score: val })
                });
            } catch (e) {
                console.error("Failed to save answer", e);
            }
        }

        async function submitQuiz() {
            elements.test.classList.add('hidden');
            elements.results.classList.add('active');
            elements.resultsList.innerHTML = `<div style="text-align:center; padding:50px;">${translations[currentLang].loadingResults}</div>`;

            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/submit-quiz?language=${currentLang}`, {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.result) {
                    renderResults(data.result);
                } else {
                    throw new Error(data.error || 'Failed to get results');
                }
            } catch (err) {
                console.error(err);
                elements.resultsList.innerHTML = `<div class="error-msg" style="color:var(--error); text-align:center; padding:20px;">${translations[currentLang].error}: ${err.message}</div>`;
            }
        }

        function renderResults(result) {
            elements.resultsList.innerHTML = '';
            const domainLabels = [];
            const domainScores = [];

            result.scores.forEach(score => {
                domainLabels.push(currentLang === 'ar' ? score.arabicTrait : score.trait);
                domainScores.push(score.score);

                const card = document.createElement('div');
                card.className = 'domain-card';
                card.onclick = () => card.classList.toggle('expanded');

                const percent = (score.score / 120) * 100;

                card.innerHTML = `
                    <div class="domain-header">
                        <div class="domain-name">${currentLang === 'ar' ? score.arabicTrait : score.trait}</div>
                        <div class="domain-score">${score.score}</div>
                    </div>
                    <div class="domain-bar">
                        <div class="domain-bar-fill" style="width: ${percent}%"></div>
                    </div>
                    <div class="facets-container">
                        ${score.facets.map(f => `
                            <div class="facet-item">
                                <div class="facet-header">
                                    <div class="facet-name">${currentLang === 'ar' ? (f.arabicTrait || f.trait) : f.trait}</div>
                                    <div class="facet-score">${f.score}</div>
                                </div>
                                <div class="facet-bar">
                                    <div class="facet-bar-fill" style="width: ${(f.score / 20) * 100}%"></div>
                                </div>
                                <div class="facet-description">${currentLang === 'ar' ? f.arabicDescription : f.description}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div style="text-align: center; margin-top: 10px;">
                        <span class="expand-indicator">▼</span>
                    </div>
                `;
                elements.resultsList.appendChild(card);
            });

            renderRadarChart(domainLabels, domainScores);
        }

        let radarChart = null;
        function renderRadarChart(labels, scores) {
            const canvas = document.getElementById('radarChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (radarChart) radarChart.destroy();

            try {
                radarChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: currentLang === 'ar' ? 'ملف الشخصية' : 'Personality Profile',
                            data: scores,
                            backgroundColor: 'rgba(155, 89, 182, 0.2)',
                            borderColor: '#9B59B6',
                            pointBackgroundColor: '#8E44AD',
                            pointBorderColor: '#fff',
                            pointHoverBackgroundColor: '#fff',
                            pointHoverBorderColor: '#9B59B6',
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            r: {
                                min: 24,
                                max: 120,
                                ticks: { stepSize: 20 },
                                pointLabels: {
                                    font: { size: 12, weight: 'bold' }
                                }
                            }
                        }
                    }
                });
            } catch (e) {
                console.error("Chart rendering failed:", e);
                canvas.parentElement.innerHTML += `<p style="color:var(--error); text-align:center;">Chart visualization failed.</p>`;
            }
        }

        elements.langToggle.onclick = () => {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            elements.langText.textContent = currentLang === 'en' ? 'العربية' : 'English';
            document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            renderQuestion();
            if (elements.results.classList.contains('active')) {
                submitQuiz();
            }
        };

        elements.themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
        };

        elements.prevBtn.onclick = () => {
            if (currentQuestionId > 1) {
                currentQuestionId--;
                renderQuestion();
            }
        };

        elements.nextBtn.onclick = () => {
            if (currentQuestionId < totalQuestions) {
                currentQuestionId++;
                renderQuestion();
            } else {
                submitQuiz();
            }
        };

        elements.retakeBtn.onclick = () => {
            localStorage.removeItem('quiz_session_120');
            window.location.reload();
        };

        init();
    </script>
</body>

</html>
