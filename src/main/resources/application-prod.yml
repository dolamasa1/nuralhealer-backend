spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none # Never auto-migrate in prod
    show-sql: false

neuralhealer:
  security:
    cookie:
      secure: true
      same-site: Strict

logging:
  level:
    "[com.neuralhealer.backend]": INFO
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": ERROR
