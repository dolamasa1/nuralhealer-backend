spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neuralhealer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:aaa}
    hikari:
      maximum-pool-size: 4 # Limited for Supabase Session Mode
      minimum-idle: 2 # Keep 2 warm connections ready
      connection-timeout: 5000 # Fail fast (5 seconds)
      idle-timeout: 600000 # 10 minutes - prevents constant recycling
      max-lifetime: 1800000 # 30 minutes
      # No connection-test-query - Hikari's built-in checks are sufficient
  jpa:
    hibernate:
      ddl-auto: none # Never auto-migrate in prod
    show-sql: false
  sql:
    init:
      mode: never # Ensure SQL init doesn't run in production

server:
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 150
    max-connections: 10000
    connection-timeout: 15000

neuralhealer:
  security:
    cookie:
      secure: true
      same-site: Strict

logging:
  level:
    "[com.neuralhealer.backend]": INFO
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": ERROR
