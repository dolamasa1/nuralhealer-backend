spring:
  cache:
    type: simple
    cache-names: aiHealthCache
  application:
    name: neuralhealer-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neuralhealer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:aaa}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
    open-in-view: false
  sql:
    init:
      mode: always
      separator: ;;
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:bmV1cmFsaGVhbGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTI1Ni1iaXRz}
  expiration: 86400000

neuralhealer:
  security:
    cookie:
      name: neuralhealer_token
      secure: false # Set to true in production
      same-site: Lax
      max-age: 86400

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 0.5.0
    description: NeuralHealer Healthcare Platform Backend
    java:
      version: 21

logging:
  level:
    com.neuralhealer.backend: INFO
    com.neuralhealer.backend.integration.gmail: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# AI Chatbot Configuration
ai:
  chatbot:
    base-url: ${AI_SERVICE_URL:https://unenticed-huong-creedless.ngrok-free.dev}
    health-endpoint: /health
    ask-endpoint: /ask
    timeout-seconds: ${AI_SERVICE_TIMEOUT_SECONDS:90}

