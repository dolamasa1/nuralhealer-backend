spring:
  cache:
    type: simple
    cache-names: aiHealthCache, doctorLobbyCache

  application:
    name: neuralhealer-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/neuralhealer}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:aaa}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
    open-in-view: false
  sql:
    init:
      mode: always
      separator: ;;
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 8192
    connection-timeout: 20000

jwt:
  secret: ${JWT_SECRET:bmV1cmFsaGVhbGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTI1Ni1iaXRz}
  expiration: 86400000

neuralhealer:
  security:
    cookie:
      name: neuralhealer_token
      secure: false # Set to true in production
      same-site: Lax
      max-age: 86400

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /swagger
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 0.5.0
    description: NeuralHealer Healthcare Platform Backend
    java:
      version: 21

logging:
  level:
    com.neuralhealer.backend: INFO
    com.neuralhealer.backend.integration.gmail: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# AI Chatbot Configuration
ai:
  chatbot:
    base-url: ${AI_SERVICE_URL:http://localhost:5000}
    api-key: ${AI_API_KEY:}
    ngrok-skip-browser-warning: ${NGROK_SKIP_BROWSER_WARNING:false}
    health-endpoint: /health
    ask-endpoint: /query
    timeout-seconds: ${AI_SERVICE_TIMEOUT_SECONDS:90}

# File Storage Configuration
file:
  storage:
    base-path: ${FILE_STORAGE_BASE_PATH}
    profile-pictures: ${PROFILE_PICTURES_PATH:doctors/profiles}
  max-size-mb: ${MAX_FILE_SIZE_MB:10}
  allowed-formats: ${ALLOWED_IMAGE_FORMATS:jpg,jpeg,png,webp}
  image:
    min-dimension: ${PROFILE_IMAGE_MIN_DIMENSION:512}
    max-dimension: ${PROFILE_IMAGE_MAX_DIMENSION:2048}
    compression-quality: ${IMAGE_COMPRESSION_QUALITY:85}
  thumbnail:
    size: ${THUMBNAIL_SIZE:256}

# Frontend Configuration
frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

# Live Session Configuration
# meet.ffmuc.net = open community Jitsi; first joiner = moderator, no auth needed.
# To use your own Jitsi server: set LIVESESSION_JITSI_DOMAIN and LIVESESSION_JWT_SECRET
livesession:
  jitsi-domain: ${LIVESESSION_JITSI_DOMAIN:meet.ffmuc.net}
  room-prefix: ${LIVESESSION_ROOM_PREFIX:neuralhealer-}
  jwt-secret: ${LIVESESSION_JWT_SECRET:neuralhealer-jitsi-secret-key-32ch}
  jwt-app-id: ${LIVESESSION_JWT_APP_ID:neuralhealer}


