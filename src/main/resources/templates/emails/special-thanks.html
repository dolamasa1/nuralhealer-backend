<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Moment Just For You</title>
</head>

<body
    style="margin: 0; padding: 0; background-color: #1A1625; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">

    <!-- Main Container -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
        style="background-color: #1A1625;">
        <tr>
            <td style="padding: 40px 20px;">

                <!-- Content Container -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
                    style="max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, #241D30 0%, #1C1A2B 100%); border: 1px solid #3F3651; border-radius: 2px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(155, 89, 182, 0.1);">

                    <!-- Logo Section -->
                    <tr>
                        <td style="padding: 6px 50px 6px; text-align: center; border-bottom: 1px solid #3F3651;">
                            <!-- Replace with your logo -->
                            <!--
                            
                      -->
                        </td>
                    </tr>

                    <!-- Main Content -->
                    <tr>
                        <td style="padding: 60px 50px 50px;">

                            <!-- Recipient Name - Hero Treatment -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="text-align: center; padding-bottom: 35px;">
                                        <div
                                            style="font-size: 42px; font-weight: 300; letter-spacing: 2px; color: #ECE8F5; line-height: 1.2; margin-bottom: 8px;">
                                            {RECIPIENT_NAME}
                                        </div>
                                        <div
                                            style="width: 60px; height: 1px; background: linear-gradient(90deg, transparent, #A89EC0, transparent); margin: 0 auto;">
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <!-- Personal Acknowledgment -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="padding-bottom: 30px;">
                                        <p
                                            style="margin: 0; font-size: 17px; line-height: 1.7; color: #C5B8D9; text-align: center; font-weight: 300; letter-spacing: 0.3px; font-style: italic;">
                                            {PERSONAL_ACKNOWLEDGMENT}
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <!-- Milestone Message -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="padding-bottom: 35px;">
                                        <p
                                            style="margin: 0; font-size: 16px; line-height: 1.8; color: #ECE8F5; text-align: center; font-weight: 300; letter-spacing: 0.2px;">
                                            {MILESTONE_MESSAGE}
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <!-- Exclusive Note -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="padding-bottom: 40px;">
                                        <p
                                            style="margin: 0; font-size: 15px; line-height: 1.7; color: #D8CFE8; text-align: center; font-weight: 300; letter-spacing: 0.5px;">
                                            {EXCLUSIVE_NOTE}
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <!-- Signature -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                                <tr>
                                    <td style="text-align: center;">
                                        <div
                                            style="width: 40px; height: 1px; background: linear-gradient(90deg, transparent, #A89EC0, transparent); margin: 0 auto 25px;">
                                        </div>
                                        <p
                                            style="margin: 0; font-size: 14px; color: #A89EC0; font-weight: 300; letter-spacing: 1px; line-height: 1.6;">
                                            With gratitude & pride,<br />
                                            <span style="font-style: italic; color: #C5B8D9;">The Neural Healer
                                                Team</span>
                                        </p>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>

                    <!-- Footer Accent - Purple Gradient -->
                    <tr>
                        <td
                            style="padding: 0; height: 4px; background: linear-gradient(90deg, #241D30, #9B59B6, #241D30);">
                        </td>
                    </tr>

                </table>

                <!-- Spacer -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                    <tr>
                        <td style="height: 30px;"></td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>

</html>
