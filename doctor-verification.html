<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Verification Simulator - NeuralHealer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        .status-unverified {
            background: #fee;
            color: #c33;
        }

        .status-pending {
            background: #fef3cd;
            color: #856404;
        }

        .status-verified {
            background: #d4edda;
            color: #155724;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .required {
            color: #c33;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .help-text {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-right: 10px;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .answer-display {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 14px;
            color: #333;
        }

        .completion-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }

        .completion-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
        }

        .completion-text {
            text-align: center;
            margin-top: 6px;
            font-size: 12px;
            color: #666;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Doctor Verification Portal</h1>
            <p>NeuralHealer Platform</p>
            <div class="status-badge" id="statusBadge">Status: Unverified</div>
            <div class="completion-bar">
                <div class="completion-fill" id="completionBar" style="width: 20%;"></div>
            </div>
            <div class="completion-text" id="completionText">Profile Completion: 20%</div>
        </div>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>

        <!-- Step 1: View Questions -->
        <div class="section" id="questionsSection">
            <div class="section-title">📋 Verification Questions</div>
            <div id="questionsList"></div>
            <button class="btn btn-primary" onclick="showAnswerForm()">Start Verification</button>
        </div>

        <!-- Step 2: Answer Form -->
        <div class="section hidden" id="answerSection">
            <div class="section-title">✍️ Submit Your Answers</div>
            <form id="verificationForm">
                <div class="actions">
                    <button type="button" class="btn btn-secondary" onclick="cancelSubmission()">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Submit Verification</button>
                </div>
            </form>
        </div>

        <!-- Step 3: View Submitted Answers -->
        <div class="section hidden" id="answersSection">
            <div class="section-title">📄 Your Submitted Answers</div>
            <div id="submittedAnswers"></div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="editAnswers()">Edit Answers</button>
            </div>
        </div>

        <!-- Step 4: Admin Actions (Simulator Only) -->
        <div class="section hidden" id="adminSection">
            <div class="section-title">🔐 Admin Actions (Simulator Only)</div>
            <div class="alert alert-info">
                In production, only admins can approve/reject verifications.
            </div>
            <div class="actions">
                <button class="btn btn-success" onclick="approveVerification()">✅ Approve</button>
                <button class="btn btn-danger" onclick="rejectVerification()">❌ Reject</button>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let currentStatus = 'unverified';
        let submittedAnswers = {};
        let questions = [];

        // Detect API Base
        const getApiBase = () => {
            // If running on port 8080 (same as backend), we use the context path
            if (window.location.port === '8080') return '/api';
            // If running as a file or different port, point to local backend
            return 'http://localhost:8080/api';
        };

        const API_BASE = getApiBase();
        const AUTH_TOKEN_KEY = 'neuralhealer_token';

        // Initialize
        window.onload = function () {
            initializeApp();
        };

        async function initializeApp() {
            try {
                // 1. Fetch Questions
                await fetchQuestions();

                // 2. Fetch Profile to get Status & Completion
                await fetchProfile();

                // 3. Fetch current answers if pending/verified
                if (currentStatus !== 'unverified') {
                    await fetchSubmittedAnswers();
                }
            } catch (error) {
                console.error('Initialization error:', error);
                showAlert('error', 'Failed to connect to backend. Please check your connection.');
            }
        }

        async function fetchQuestions() {
            const response = await fetch(`${API_BASE}/doctors/verification/questions`, {
                credentials: 'include'
            });
            if (!response.ok) throw new Error('Could not fetch questions');

            const data = await response.json();
            questions = data.map(q => ({
                key: q.key,
                label: q.label,
                required: q.required,
                type: q.type || 'text',
                placeholder: q.placeholder || '',
                helpText: q.description || ''
            }));

            displayQuestions();
            renderAnswerForm();
        }

        async function fetchProfile() {
            const token = localStorage.getItem(AUTH_TOKEN_KEY);
            const headers = {};
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            const response = await fetch(`${API_BASE}/doctors/me/profile`, {
                headers: headers,
                credentials: 'include' // Crucial for HttpOnly cookies
            });

            if (response.status === 401 || response.status === 403) {
                // If we get 401/403, it means neither cookie nor token worked
                showAlert('info', 'Please log in as a doctor to view your full status.');
                return;
            }

            if (response.ok) {
                const profile = await response.json();
                updateStatus(profile.verificationStatus.toLowerCase());
                updateCompletion(profile.profileCompletion);

                if (profile.verificationStatus.toLowerCase() === 'pending' ||
                    profile.verificationStatus.toLowerCase() === 'verified') {
                    document.getElementById('questionsSection').classList.add('hidden');
                    document.getElementById('answersSection').classList.remove('hidden');
                }
            }
        }

        async function fetchSubmittedAnswers() {
            const token = localStorage.getItem(AUTH_TOKEN_KEY);
            const headers = {};
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            const response = await fetch(`${API_BASE}/doctors/verification/me/answers`, {
                headers: headers,
                credentials: 'include'
            });

            if (response.ok) {
                const answersData = await response.json();
                // Map API response to our submittedAnswers object
                submittedAnswers = {};
                answersData.forEach(ans => {
                    submittedAnswers[ans.questionKey] = ans.answer;
                });
                displaySubmittedAnswers();
            }
        }

        function displayQuestions() {
            const container = document.getElementById('questionsList');
            container.innerHTML = questions.map((q, i) => `
                <div class="form-group">
                    <label>${i + 1}. ${q.label} ${q.required ? '<span class="required">*</span>' : ''}</label>
                    <div class="help-text">${q.helpText}</div>
                </div>
            `).join('');
        }

        function renderAnswerForm() {
            const form = document.getElementById('verificationForm');
            const actions = form.querySelector('.actions');

            // Generate form fields dynamically based on questions
            const dynamicFields = questions.map(q => `
                <div class="form-group">
                    <label>${q.label} ${q.required ? '<span class="required">*</span>' : ''}</label>
                    <input type="${q.type}" id="${q.key}" ${q.required ? 'required' : ''} 
                           placeholder="${q.placeholder}">
                    <div class="help-text">${q.helpText}</div>
                </div>
            `).join('');

            // Insert before actions
            const content = document.createElement('div');
            content.innerHTML = dynamicFields;
            form.insertBefore(content, actions);
        }

        function showAnswerForm() {
            const token = localStorage.getItem(AUTH_TOKEN_KEY);
            if (!token) {
                showAlert('error', 'You must be logged in as a doctor to submit verification.');
                return;
            }
            document.getElementById('questionsSection').classList.add('hidden');
            document.getElementById('answerSection').classList.remove('hidden');
        }

        function cancelSubmission() {
            document.getElementById('answerSection').classList.add('hidden');
            document.getElementById('questionsSection').classList.remove('hidden');
        }

        // Handle form submission
        document.getElementById('verificationForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const token = localStorage.getItem(AUTH_TOKEN_KEY);
            const answers = {};
            questions.forEach(q => {
                const element = document.getElementById(q.key);
                if (element && element.value) {
                    answers[q.key] = element.value;
                }
            });

            const headers = {
                'Content-Type': 'application/json'
            };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(`${API_BASE}/doctors/verification/me/submit`, {
                    method: 'POST',
                    headers: headers,
                    credentials: 'include',
                    body: JSON.stringify({ answers })
                });

                if (response.ok) {
                    const data = await response.json();
                    showAlert('success', `✅ ${data.message}`);

                    submittedAnswers = answers;
                    updateStatus('pending');
                    displaySubmittedAnswers();

                    document.getElementById('answerSection').classList.add('hidden');
                    document.getElementById('answersSection').classList.remove('hidden');

                    // Re-fetch profile to get updated completion
                    fetchProfile();
                } else {
                    const error = await response.json();
                    showAlert('error', `❌ Submission failed: ${error.message || 'Unknown error'}`);
                }
            } catch (err) {
                showAlert('error', '❌ Network error during submission.');
            }
        });

        function displaySubmittedAnswers() {
            const container = document.getElementById('submittedAnswers');
            container.innerHTML = Object.entries(submittedAnswers)
                .map(([key, value]) => {
                    const question = questions.find(q => q.key === key);
                    const label = question ? question.label : key;
                    return `
                        <div class="form-group">
                            <label>${label}</label>
                            <div class="answer-display">${value}</div>
                        </div>
                    `;
                }).join('');
        }

        function editAnswers() {
            // Pre-fill form with existing answers
            questions.forEach(q => {
                const input = document.getElementById(q.key);
                if (input && submittedAnswers[q.key]) {
                    input.value = submittedAnswers[q.key];
                }
            });

            document.getElementById('answersSection').classList.add('hidden');
            document.getElementById('answerSection').classList.remove('hidden');
        }

        // Simulator placeholders for admin actions (would require admin token and different endpoints)
        async function approveVerification() {
            showAlert('info', 'Admin approval should be done via Admin Dashboard.');
        }

        async function rejectVerification() {
            showAlert('info', 'Admin rejection should be done via Admin Dashboard.');
        }

        function updateStatus(status) {
            currentStatus = status;
            const badge = document.getElementById('statusBadge');

            badge.className = 'status-badge';
            switch (status) {
                case 'unverified':
                    badge.classList.add('status-unverified');
                    badge.textContent = 'Status: Unverified';
                    break;
                case 'pending':
                    badge.classList.add('status-pending');
                    badge.textContent = 'Status: Pending Review';
                    break;
                case 'verified':
                    badge.classList.add('status-verified');
                    badge.textContent = 'Status: ✓ Verified';
                    break;
                default:
                    badge.classList.add('status-unverified');
                    badge.textContent = `Status: ${status}`;
            }
        }

        function updateCompletion(percentage) {
            document.getElementById('completionBar').style.width = percentage + '%';
            document.getElementById('completionText').textContent = `Profile Completion: ${percentage}%`;
        }

        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
            if (type === 'info') alertClass = 'alert-info';

            container.innerHTML = `
                <div class="alert ${alertClass}">
                    ${message}
                </div>
            `;

            if (type !== 'error') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 5000);
            }
        }
    </script>
</body>

</html>
